name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

defaults:
  run:
    working-directory: cova

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: cova/go.mod

      - name: Cache Go binaries
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-bin-${{ hashFiles('cova/go.mod', 'cova/go.sum') }}

      - name: Install gotestsum
        run: command -v gotestsum || go install gotest.tools/gotestsum@v1.13.0

      - name: Run Tests
        run: gotestsum --format testdox -- -race -covermode atomic -coverprofile coverage.out ./...

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          files: cova/coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: cova/go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: cova
